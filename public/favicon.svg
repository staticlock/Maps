<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- 背景圆形 -->
  <circle cx="32" cy="32" r="30" fill="url(#bgGrad)"/>

  <!-- 渐变定义 -->
  <defs>
    <radialGradient id="bgGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#6EE7F7"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </radialGradient>
    <radialGradient id="faceGrad" cx="45%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FFF0D0"/>
      <stop offset="100%" stop-color="#FDDCAB"/>
    </radialGradient>
  </defs>

  <!-- 地图本体（卡通折叠地图） -->
  <rect x="14" y="20" width="36" height="26" rx="3" fill="#FFF9F0" stroke="#E8C97A" stroke-width="1.5"/>
  <!-- 地图折叠线 -->
  <line x1="26" y1="20" x2="26" y2="46" stroke="#E8C97A" stroke-width="1.2" stroke-dasharray="2,2"/>
  <line x1="38" y1="20" x2="38" y2="46" stroke="#E8C97A" stroke-width="1.2" stroke-dasharray="2,2"/>
  <!-- 地图道路装饰 -->
  <path d="M17 30 Q22 28 26 31 Q30 34 34 30 Q38 26 47 29" stroke="#A3D4FF" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M17 38 Q23 36 30 39 Q37 42 47 38" stroke="#A3D4FF" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- 绿色区域 -->
  <ellipse cx="20" cy="36" rx="3" ry="2.5" fill="#86EFAC" opacity="0.8"/>
  <ellipse cx="43" cy="28" rx="2.5" ry="2" fill="#86EFAC" opacity="0.8"/>

  <!-- 卡通大头针 -->
  <!-- 针脚 -->
  <path d="M32 26 Q29 35 32 40 Q35 35 32 26Z" fill="#FF6B6B"/>
  <!-- 针头圆圈 -->
  <circle cx="32" cy="24" r="5" fill="#FF4040" stroke="white" stroke-width="1.5"/>
  <!-- 针头高光（二次元感） -->
  <circle cx="30.5" cy="22.5" r="1.5" fill="white" opacity="0.8"/>
  <!-- 针头卡通眼睛 -->
  <circle cx="31" cy="24" r="0.8" fill="white"/>
  <circle cx="33" cy="24" r="0.8" fill="white"/>
  <circle cx="31.2" cy="24.1" r="0.45" fill="#222"/>
  <circle cx="33.2" cy="24.1" r="0.45" fill="#222"/>
  <!-- 针头小嘴 -->
  <path d="M31 25.5 Q32 26.3 33 25.5" stroke="#222" stroke-width="0.6" stroke-linecap="round" fill="none"/>

  <!-- 外圈光晕 -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="white" stroke-width="1.5" opacity="0.3"/>
</svg>
